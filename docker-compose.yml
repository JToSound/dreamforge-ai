services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER:     lmstudio
      LLM_BASE_URL:     http://host.docker.internal:1234/v1
      LLM_MODEL:        qwen/qwen3.5-9b
      LLM_API_KEY:      lm-studio
      LLM_TIMEOUT:      "120"
      LLM_TIMEOUT_SECONDS: "45.0"
      LLM_JSON_MODE:   "false"
      LLM_MAX_TOKENS:   "2048"
      LLM_TEMPERATURE:  "0.85"
      REDIS_URL:        redis://redis:6379
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        DEV: "1"
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      SIM_REQUEST_TIMEOUT_SECONDS: "3600"
      PYTHONPATH: /app
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: node:20-alpine
    working_dir: /workspace/web-frontend
    command: sh -c "npm install --include=dev && npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/web-frontend/node_modules
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: dreamforge
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  frontend_node_modules:
