version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # ── LM Studio 設定 ──────────────────────────────────────
      # host.docker.internal 指向你 Mac/Windows 的 localhost
      LLM_PROVIDER:     lmstudio
      LLM_BASE_URL:     http://host.docker.internal:1234/v1
      LLM_MODEL:        qwen/qwen3.5-9b
      LLM_API_KEY:      lm-studio
      LLM_TIMEOUT:      "120"
      LLM_MAX_TOKENS:   "512"
      LLM_TEMPERATURE:  "0.85"
      # ── Redis ───────────────────────────────────────────────
      REDIS_URL:        redis://redis:6379
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux Docker 必須加呢行

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"