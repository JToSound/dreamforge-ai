version: '3.9'

services:
  api:
    build: .
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis

  dashboard:
    build: .
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    command: streamlit run visualization/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
