name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements.dashboard.txt || true

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Format check with Black
        run: |
          black --check .

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build dashboard image (Buildx with GHA cache)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.dashboard
          target: runtime
          load: true
          push: false
          tags: dreamforge/dashboard:ci
          build-args: |
            DEV=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests inside dashboard image (smoke)
        run: |
          docker run --rm dreamforge/dashboard:ci python -m pytest -q || true
